<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="STYLE.CSS" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&family=Geist:wght@100..900&family=Hedvig+Letters+Serif:opsz@12..24&family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body class="geist-<uniquifier">
    <!-- log in page start -->
    <section
      id="login-section"
      class="flex items-center justify-center min-h-screen p-6"
    >
      <div
        class="bg-white p-12 rounded-[40px] shadow-2xl w-full max-w-[460px] border border-slate-50 text-center"
      >
        <div
          class="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"
        >
          <i class="fa-brands fa-github text-5xl text-slate-900"></i>
        </div>
        <h1 class="text-2xl font-black text-slate-800 tracking-tight">
          GitHub Issues Tracker
        </h1>
        <p class="text-slate-400 text-sm mt-2 mb-10">
          Sign in to manage your project issues
        </p>
        <div class="space-y-4 text-left">
          <input
            type="text"
            id="username"
            class="input input-bordered w-full rounded-2xl h-14"
            value="admin"
          />
          <input
            type="password"
            id="password"
            class="input input-bordered w-full rounded-2xl h-14"
            value="admin123"
          />
          <button
            onclick="handleLogin()"
            class="btn btn-primary w-full bg-indigo-600 border-none hover:bg-indigo-700 text-white rounded-2xl h-14 font-bold mt-4 shadow-lg shadow-indigo-100"
          >
            Sign In
          </button>
        </div>
      </div>
    </section>
    <!-- log in page end -->

    <!-- Dashboard page start -->
    <section id="dashboard-section" class="hidden">
      <nav
        class="bg-white border-b border-slate-100 px-10 py-5 flex flex-col md:flex-row justify-between items-center sticky top-0 z-50 gap-4"
      >
        <div class="flex items-center gap-3">
          <i class="fa-brands fa-github text-4xl"></i>
          <span class="font-extrabold text-xl">Issues Tracker</span>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
          <input
            type="text"
            id="search-box"
            placeholder="Search by title..."
            class="input input-bordered w-full md:w-80 rounded-xl"
          />
          <button
            onclick="handleSearch()"
            class="btn bg-indigo-600 hover:bg-indigo-700 text-white border-none rounded-xl px-8"
          >
            Search
          </button>
        </div>
      </nav>

      <main class="max-w-[1440px] mx-auto p-6 md:p-12">
        <div class="flex justify-center gap-3 mb-12">
          <button
            onclick="fetchIssues('all')"
            id="tab-all"
            class="btn btn-sm rounded-xl px-10 h-10"
          >
            All
          </button>
          <button
            onclick="fetchIssues('open')"
            id="tab-open"
            class="btn btn-sm rounded-xl px-10 h-10 bg-slate-100 border-none"
          >
            Open
          </button>
          <button
            onclick="fetchIssues('closed')"
            id="tab-closed"
            class="btn btn-sm rounded-xl px-10 h-10 bg-slate-100 border-none"
          >
            Closed
          </button>
        </div>

        <div
          class="bg-white p-8 rounded-[32px] border border-slate-100 mb-10 flex justify-between items-center shadow-sm"
        >
          <div class="flex items-center gap-2">
            <div><img src="assets/Aperture.png" alt="" srcset="" /></div>
            <div>
              <h2 class="text-4xl font-black text-slate-800 tracking-tighter">
                <span id="count-display">0</span> Issues
              </h2>
              <p class="text-slate-400 font-medium mt-1">
                Real-time issue tracking
              </p>
            </div>
          </div>

          <div
            class="flex gap-6 font-bold text-[10px] uppercase tracking-widest"
          >
            <span class="text-emerald-500"
              ><i class="fa-solid fa-circle text-[6px] mr-1"></i> Open</span
            >
            <span class="text-indigo-600"
              ><i class="fa-solid fa-circle text-[6px] mr-1"></i> Closed</span
            >
          </div>
        </div>

        <div id="loader" class="hidden text-center py-32">
          <span class="loader"></span>
        </div>
        <div
          id="grid-container"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"
        ></div>
      </main>
    </section>
    <!-- Dashboard page end -->

    <!-- Modal start -->
    <dialog id="issue_modal" class="modal">
      <div
        class="modal-box max-w-2xl bg-white rounded-[40px] p-0 shadow-2xl overflow-hidden"
      >
        <div class="p-10 pb-6 bg-slate-50/50">
          <h3
            id="modal-title"
            class="font-extrabold text-3xl text-slate-800 leading-tight"
          ></h3>
          <div class="flex items-center gap-3 mb-2">
            <span
              id="modal-status"
              class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest text-white shadow-sm"
            ></span>
            <span class="text-xs text-slate-400 font-semibold"
              >Opened by
              <span
                id="modal-author-name"
                class="text-slate-700 font-bold"
              ></span>
              • <span id="modal-date" class=""></span
            ></span>
          </div>
        </div>

        <div class="p-10 pt-2">
          <div class="flex gap-2 mb-4">
            <span class="tag-badge bg-rose-50 text-rose-500 border-rose-100"
              ><i class="fa-solid fa-bug text-xs"></i> BUG</span
            >
            <span
              class="tag-badge bg-orange-50 text-orange-500 border-orange-100"
              ><i class="fa-solid fa-handshake-angle text-xs"></i> HELP
              WANTED</span
            >
          </div>
          <p
            id="modal-desc"
            class="text-slate-500 leading-relaxed text-base mb-6"
          ></p>
          <div
            class="bg-[#f8fafc] rounded-3xl p-8 border border-slate-100 grid grid-cols-2 gap-8 shadow-inner"
          >
            <div>
              <p
                class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-1"
              >
                Assignee:
              </p>
              <p
                id="modal-assignee"
                class="text-lg font-bold text-slate-800"
              ></p>
            </div>
            <div>
              <p
                class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-2"
              >
                Priority:
              </p>
              <span
                id="modal-priority"
                class="px-4 py-1 rounded-full text-[10px] font-black text-white uppercase shadow-sm"
              ></span>
            </div>
          </div>
        </div>

        <div class="p-8 flex justify-end">
          <form method="dialog">
            <button
              class="btn btn-primary bg-indigo-600 border-none px-12 rounded-2xl h-12 shadow-lg shadow-indigo-100"
            >
              Close
            </button>
          </form>
        </div>
      </div>
      <form
        method="dialog"
        class="modal-backdrop bg-slate-900/60 backdrop-blur-md"
      >
        <button>close</button>
      </form>
    </dialog>
    <!-- Modal end -->

    <script src="app.js"></script>
  </body>
</html>
